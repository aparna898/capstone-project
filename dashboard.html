<!DOCTYPE html>
<html>
<head>
<title>ATS Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

/* THEME VARIABLES */

:root{
--bg:linear-gradient(135deg,#eef2ff,#fdf4ff,#ecfeff);
--sidebar:linear-gradient(180deg,#4f46e5,#7c3aed);
--card:rgba(255,255,255,0.75);
--text:#1f2937;
--muted:#6b7280;
--accent:#7c3aed;
}

body.dark{
--bg:#0f172a;
--sidebar:linear-gradient(180deg,#020617,#0f172a);
--card:#1e293b;
--text:#f1f5f9;
--muted:#94a3b8;
--accent:#a78bfa;
}

body{
display:flex;
height:100vh;
background:var(--bg);
transition:0.3s;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:var(--sidebar);
color:white;
padding:30px 20px;
display:flex;
flex-direction:column;
}

.logo{
font-size:22px;
font-weight:600;
margin-bottom:40px;
}

.menu a{
display:block;
text-decoration:none;
color:#e5e7eb;
padding:12px;
border-radius:10px;
margin-bottom:10px;
transition:0.3s;
}

.menu a:hover{
background:rgba(255,255,255,0.15);
}

/* MAIN */

.main{
flex:1;
padding:40px;
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.topbar h2{
color:var(--text);
}

.search{
padding:10px 15px;
border-radius:10px;
border:none;
background:var(--card);
color:var(--text);
}

.toggle{
padding:8px 15px;
border:none;
border-radius:20px;
background:var(--accent);
color:white;
cursor:pointer;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
padding:25px;
border-radius:16px;
background:var(--card);
color:var(--text);
box-shadow:0 10px 25px rgba(0,0,0,0.05);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card p{
color:var(--muted);
}

.card h3{
margin-top:8px;
font-size:28px;
color:var(--accent);
}

/* UPLOAD */

.upload{
background:linear-gradient(135deg,#6366f1,#9333ea);
color:white;
padding:40px;
border-radius:18px;
text-align:center;
margin-bottom:30px;
}

.upload button{
margin-top:20px;
padding:12px 26px;
border:none;
border-radius:30px;
background:white;
color:#4f46e5;
font-weight:600;
cursor:pointer;
}

/* SCORE */

.score{
padding:30px;
border-radius:18px;
background:var(--card);
color:var(--text);
}

.score-value{
font-size:50px;
font-weight:600;
color:var(--accent);
margin:10px 0;
}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">ATS</div>

<div class="menu">
<a href="#">Dashboard</a>
<a href="#">Applicants</a>
<a href="#">Resume Analyzer</a>
<a href="#">Interviews</a>
<a href="#">Analytics</a>
<a href="#">Settings</a>
</div>

</div>


<div class="main">

<div class="topbar">

<h2>Dashboard</h2>

<div>
<input class="search" placeholder="Search candidates">
<button class="toggle" onclick="toggleTheme()">🌙 Dark</button>
</div>

</div>


<div class="cards">

<div class="card">
<p>Total Applicants</p>
<h3>132</h3>
</div>

<div class="card">
<p>Interviews Scheduled</p>
<h3>24</h3>
</div>

<div class="card">
<p>Jobs Posted</p>
<h3>8</h3>
</div>

</div>


<div class="upload">

<h2>Upload Resume</h2>
<p>Drag & drop your resume to check ATS compatibility</p>

<button>Upload Resume</button>

</div>


<div class="score">

<h3>ATS Compatibility Score</h3>

<div class="score-value">86%</div>

<p>Your resume is optimized for most ATS systems.</p>

</div>

</div>


<script>

function toggleTheme(){
document.body.classList.toggle("dark");
}

</script>

</body>
</html>
