<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Careersfit — Auth</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#e0ecff,#dbeafe,#eff6ff);
color:#1e293b;
}

.container{
background:white;
padding:40px 30px;
border-radius:18px;
width:100%;
max-width:420px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

h2{
text-align:center;
margin-bottom:24px;
color:#2563eb;
}

.form-group{
margin-bottom:18px;
position:relative;
}

label{
display:block;
margin-bottom:6px;
font-size:14px;
}

input{
width:100%;
padding:12px 40px 12px 12px;
border-radius:10px;
border:1px solid #e2e8f0;
background:#f8fafc;
outline:none;
}

.eye-icon{
position:absolute;
right:12px;
top:38px;
cursor:pointer;
}

.btn{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-weight:600;
cursor:pointer;
}

.btn:hover{
background:#1d4ed8;
}

.switch{
text-align:center;
margin-top:16px;
font-size:14px;
}

.switch a{
color:#2563eb;
cursor:pointer;
font-weight:600;
text-decoration:none;
}

.hidden{
display:none;
}

/* DARK MODE */

@media (prefers-color-scheme: dark){

body{
background:linear-gradient(135deg,#020617,#0f172a,#1e3a8a);
color:#e2e8f0;
}

.container{
background:#0f172a;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

input{
background:#020617;
border:1px solid #1e293b;
color:white;
}

}

</style>

</head>

<body>

<div class="container">

<!-- LOGIN FORM -->

<div id="loginForm">

<h2>Sign In</h2>

<div class="form-group">
<label>Email</label>
<input type="email" placeholder="Enter your email">
</div>

<div class="form-group">
<label>Password</label>
<input type="password" id="loginPassword">
<span class="eye-icon" onclick="togglePassword('loginPassword')">👁</span>
</div>

<button class="btn">Sign In</button>

<div class="switch">
Don't have an account?
<a onclick="showSignup()">Create Account</a>
</div>

</div>

<!-- SIGNUP FORM -->

<div id="signupForm" class="hidden">

<h2>Create Account</h2>

<div class="form-group">
<label>Full Name</label>
<input type="text" placeholder="Enter your name">
</div>

<div class="form-group">
<label>Email</label>
<input type="email" placeholder="Enter your email">
</div>

<div class="form-group">
<label>Password</label>
<input type="password" id="signupPassword">
<span class="eye-icon" onclick="togglePassword('signupPassword')">👁</span>
</div>

<div class="form-group">
<label>Confirm Password</label>
<input type="password" id="confirmPassword">
<span class="eye-icon" onclick="togglePassword('confirmPassword')">👁</span>
</div>

<button class="btn">Create Account</button>

<div class="switch">
Already have an account?
<a onclick="showLogin()">Sign In</a>
</div>

</div>

</div>

<script>

function togglePassword(id){
let input=document.getElementById(id);
input.type = input.type === "password" ? "text" : "password";
}

function showSignup(){
document.getElementById("loginForm").classList.add("hidden");
document.getElementById("signupForm").classList.remove("hidden");
}

function showLogin(){
document.getElementById("signupForm").classList.add("hidden");
document.getElementById("loginForm").classList.remove("hidden");
}

</script>

</body>
</html>
